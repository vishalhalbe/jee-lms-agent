name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run --reporter=verbose --passWithNoTests
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
          CLERK_SECRET_KEY: sk_test_stub
          DATABASE_URL: postgresql://stub
          OPENROUTER_API_KEY: sk-or-stub
          OPENROUTER_BASE_URL: https://openrouter.ai/api/v1

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Run after the main CI job passes to avoid wasting browser install time
    needs: ci

    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
      CLERK_SECRET_KEY: sk_test_stub
      DATABASE_URL: postgresql://stub
      OPENROUTER_API_KEY: sk-or-stub
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Install only the browsers used in playwright.config.ts to keep the
      # step fast. --with-deps also installs OS-level system libraries.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # Build the production bundle so `next start` can serve the app.
      # The build output is deterministic; cache it on the branch + lockfile key.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '!node_modules/**', '!e2e/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js production bundle
        run: npm run build

      # `webServer` in playwright.config.ts starts `next start` automatically
      # before the suite; no manual background process needed here.
      - name: Run Playwright E2E tests
        run: npx playwright test

      # Upload artifacts so failures are inspectable without re-running locally.
      # `if: always()` ensures artifacts are uploaded even when tests fail.
      - name: Upload test artifacts (screenshots, videos, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
            playwright-results.xml
          retention-days: 14
          # Do not fail the upload step if there are no artifacts (clean run)
          if-no-files-found: ignore
